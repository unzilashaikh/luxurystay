# Optional: run local MongoDB instead of Atlas
# Usage: docker compose up -d
# Then set in backend/.env:
# MONGO_URI=mongodb://127.0.0.1:27017/luxurystay

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - luxurystay_mongo:/data/db

volumes:
  luxurystay_mongo:
